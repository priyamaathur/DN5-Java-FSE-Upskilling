<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner { background-color : blue; color: white; padding:20px;}
        .highlight { background-color: yellow;}

    </style>
</head>
<body>
    <!-- div with id - block element -->
    <div id = "welcomeBanner">
        <h1> Welcome, Priya!</h1>
        <!-- span with inline style - inline element -->
         <p> Special Offer: Get 20% off on your next purchase! <span class = "highlight">Limited Time Offer!</span></p>
    </div>
    
    <!-- class reused on multiple elements -->



<p class="highlight"> Upcoming: Tech Meetup</p>
<p class="highlight"> Upcoming: AI Conference</p>
</body> 

</html>
