<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

</head>
<body>

    <h2> Event Registration Form</h2>
    <form>
        <label> Full Name:</label><br>
        <input type="text" name="fullname" placeholder="Enter your full name"><br><br>
        <label> Email:</label><br>
        <input type="email" name="email" placeholder="Enter your email"><br><
        <label> Date:</label><br>
        <input type="date" name="date"><br><br>
<label> Event Type:</label><br>
<select required>
    <option value="">Select an event type</option>
    <option value="conference">Conference</option>
    <option value="workshop">Workshop</option>
    <option value="seminar">Cybersecurity Seminar</option>
    <option value="webinar">Food Fair</option>
    <option value="festival">Music Festival</option>
</select><br><br>
        <label>Message:</label><br>
        <textarea placeholder="Any message..."></textarea><br><br>
        <button type="submit">Register </button>

    </form>
    <output>Form Submitted Successfully!</output>
    
</body>
</html>
