<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">
        <h2>Badge over Image</h2>

        <!-- position-relative and position-absolute -->
        <div class="position-relative d-inline-block">
            <img src="https://picsum.photos/seed/event/200/150" alt="Event">
            <span class="position-absolute top-0 start-0 badge bg-danger">New</span>
        </div>
    </div>

    <!-- Fixed footer -->
    <footer class="position-fixed bottom-0 w-100 bg-dark text-white text-center p-2">
        &copy; 2025 Community Portal — Fixed Footer
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
