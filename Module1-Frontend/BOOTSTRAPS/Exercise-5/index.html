<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alignment and Reordering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">

        <h2>Centered Content</h2>
        <div class="row justify-content-center align-items-center" style="height:150px; background:#e8f0fe;">
            <div class="col-md-4 text-center border p-3">
                Centered Column
            </div>
        </div>

        <h2 class="mt-4">Column Reordering</h2>
        <div class="row">
            <!-- On desktop: Second appears first -->
            <div class="col-md-6 order-md-2 bg-light border p-3">
                First in HTML — Second on desktop
            </div>
            <div class="col-md-6 order-md-1 bg-light border p-3">
                Second in HTML — First on desktop
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
