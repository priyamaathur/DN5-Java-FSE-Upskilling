<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">
        <h2>Responsive Grid Layout</h2>
        <p>3 columns on desktop, 2 on tablet, 1 on mobile</p>

        <div class="row">
            <!-- col-12 mobile, col-md-6 tablet, col-lg-4 desktop -->
            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div class="border p-3 bg-light">Tech Meetup</div>
            </div>
            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div class="border p-3 bg-light">AI Conference</div>
            </div>
            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div class="border p-3 bg-light">Frontend Bootcamp</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
