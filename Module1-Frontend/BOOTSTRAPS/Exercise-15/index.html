<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borders and Shadows</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">

        <h2>Border Utilities</h2>
        <img src="https://picsum.photos/100/100"
             class="border border-primary border-3 rounded-circle m-2" alt="Round Image">
        <img src="https://picsum.photos/seed/b2/100/100"
             class="border border-danger rounded m-2" alt="Rounded Image">

        <h2 class="mt-4">Shadow Utilities</h2>
        <div class="card shadow mb-4 p-3">
            <p>Card with shadow</p>
        </div>
        <div class="card shadow-lg mb-4 p-3">
            <p>Card with shadow-lg</p>
        </div>

        <h2 class="mt-4">Rounded Pills</h2>
        <div class="card rounded-pill shadow p-3 text-center">
            <p class="mb-0">Rounded Pill Card</p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
