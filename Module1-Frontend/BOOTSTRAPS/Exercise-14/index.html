<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display and Visibility</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">
        <h2>Display Utilities</h2>

        <!-- Hidden on mobile, visible on medium+ -->
        <div class="d-none d-md-block bg-info text-white p-3 mb-2">
            Visible only on tablets and desktops
        </div>

        <!-- Visible on mobile only -->
        <div class="d-block d-md-none bg-warning p-3 mb-2">
            Visible only on mobile
        </div>

        <!-- Flex on large screens -->
        <div class="d-lg-flex bg-light border p-3 mb-2">
            <div class="p-2 border">Item 1</div>
            <div class="p-2 border">Item 2</div>
            <div class="p-2 border">Item 3</div>
        </div>

        <h2 class="mt-4">Responsive Sidebar</h2>
        <div class="row">
            <!-- Sidebar - hidden on mobile -->
            <div class="col-md-3 d-none d-md-block bg-light border p-3">
                <h5>Sidebar</h5>
                <p>Only on tablet+</p>
            </div>
            <div class="col-12 col-md-9 border p-3">
                <h5>Main Content</h5>
                <p>Always visible</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
