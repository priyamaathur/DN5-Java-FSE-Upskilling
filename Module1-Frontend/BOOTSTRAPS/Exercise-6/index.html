<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">

        <!-- Responsive navbar using flexbox -->
        <nav class="d-flex flex-column flex-md-row bg-dark p-3 mb-4">
            <a href="#" class="text-white me-3 mb-2 mb-md-0">Home</a>
            <a href="#" class="text-white me-3 mb-2 mb-md-0">Events</a>
            <a href="#" class="text-white me-3 mb-2 mb-md-0">Contact</a>
        </nav>

        <!-- Card layout with flexbox -->
        <h2>Event Cards</h2>
        <div class="d-flex justify-content-between align-items-center border p-3">
            <span>Tech Meetup</span>
            <span class="badge bg-primary">Upcoming</span>
        </div>
        <div class="d-flex justify-content-between align-items-center border p-3 mt-2">
            <span>AI Conference</span>
            <span class="badge bg-success">Completed</span>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
