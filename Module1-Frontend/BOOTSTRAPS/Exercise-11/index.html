<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">

        <h2>Profile Card</h2>
        <div class="card" style="width: 18rem;">
            <img src="https://picsum.photos/seed/profile/300/200"
                 class="card-img-top" alt="Event Image">
            <div class="card-body">
                <h5 class="card-title">Tech Meetup</h5>
                <p class="card-text">Join us for an exciting tech meetup in New York.</p>
                <a href="#" class="btn btn-primary">Register</a>
            </div>
        </div>

        <h2 class="mt-4">Media Object</h2>
        <div class="d-flex align-items-start mt-3">
            <img src="https://picsum.photos/seed/media/80/80"
                 class="me-3" alt="Speaker">
            <div>
                <h5>Dr. Tech</h5>
                <p>Speaker at Tech Innovators Meetup. Expert in AI and Web Development.</p>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
