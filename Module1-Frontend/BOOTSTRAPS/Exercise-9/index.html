<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">

        <h2>Contextual Buttons</h2>
        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-secondary">Secondary</button>
        <button class="btn btn-success">Success</button>
        <button class="btn btn-danger">Danger</button>
        <button class="btn btn-warning">Warning</button>
        <button class="btn btn-info">Info</button>
        <button class="btn btn-light">Light</button>
        <button class="btn btn-dark">Dark</button>

        <h2 class="mt-4">Outline Buttons</h2>
        <button class="btn btn-outline-primary">Outline Primary</button>
        <button class="btn btn-outline-danger">Outline Danger</button>
        <button class="btn btn-outline-success">Outline Success</button>

        <h2 class="mt-4">Button Group</h2>
        <div class="btn-group">
            <button class="btn btn-primary">Tech</button>
            <button class="btn btn-primary">Music</button>
            <button class="btn btn-primary">Food</button>
        </div>

        <h2 class="mt-4">Toggle Buttons</h2>
        <input type="checkbox" class="btn-check" id="btn1" autocomplete="off">
        <label class="btn btn-outline-primary" for="btn1">Toggle Me</label>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
