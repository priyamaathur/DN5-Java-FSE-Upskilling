<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column Layouts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">

        <h2>Two Column Layout — Sidebar + Content</h2>
        <div class="row mb-4">
            <div class="col-md-3 bg-light border p-3">
                <h5>Sidebar</h5>
                <p>Filter Events</p>
            </div>
            <div class="col-md-9 border p-3">
                <h5>Main Content</h5>
                <p>Event listings go here.</p>
            </div>
        </div>

        <h2>Four Equal Columns</h2>
        <div class="row">
            <div class="col-sm-3 border p-3 bg-light">Tech</div>
            <div class="col-sm-3 border p-3 bg-light">Music</div>
            <div class="col-sm-3 border p-3 bg-light">Food</div>
            <div class="col-sm-3 border p-3 bg-light">Art</div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
