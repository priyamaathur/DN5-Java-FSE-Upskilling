<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Icons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">
        <h2>Social Media Icons in Footer</h2>

        <footer class="bg-dark text-white p-4 text-center">
            <p>Follow us on:</p>
            <a href="#" class="text-white me-3 fs-4"><i class="bi bi-facebook"></i></a>
            <a href="#" class="text-white me-3 fs-4"><i class="bi bi-twitter"></i></a>
            <a href="#" class="text-white me-3 fs-4"><i class="bi bi-instagram"></i></a>
            <a href="#" class="text-white me-3 fs-4"><i class="bi bi-linkedin"></i></a>
        </footer>

        <h2 class="mt-4">Icon-only Buttons</h2>
        <button class="btn btn-primary me-2">
            <i class="bi bi-calendar-event"></i>
        </button>
        <button class="btn btn-success me-2">
            <i class="bi bi-person-plus"></i>
        </button>
        <button class="btn btn-danger">
            <i class="bi bi-trash"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
