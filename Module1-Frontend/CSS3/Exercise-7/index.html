<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Table Styling</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h2>Events Admin Table</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Event Name</th>
                <th>City</th>
                <th>Date</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Tech Meetup</td>
                <td>New York</td>
                <td>June 10</td>
                <td>Upcoming</td>
            </tr>
            <tr>
                <td>2</td>
                <td>AI Conference</td>
                <td>Chicago</td>
                <td>May 15</td>
                <td>Completed</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Frontend Bootcamp</td>
                <td>Los Angeles</td>
                <td>July 1</td>
                <td>Upcoming</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Music Festival</td>
                <td>New York</td>
                <td>June 20</td>
                <td>Upcoming</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
