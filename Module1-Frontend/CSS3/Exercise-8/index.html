<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Box Model</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h2>Event Cards - Box Model Demo</h2>

    <div class="eventCard">
        <h3>Tech Meetup</h3>
        <p>June 10, New York</p>
    </div>

    <div class="eventCard">
        <h3>AI Conference</h3>
        <p>May 15, Chicago</p>
    </div>

    <h2>Form with Outline</h2>
    <form>
        <input type="text" class="form-input" placeholder="Your name"><br><br>
        <input type="email" class="form-input" placeholder="Your email">
    </form>

    <h2>Visibility vs Display</h2>
    <p class="visible-hidden">This is visibility:hidden (takes space)</p>
    <p class="display-none">This is display:none (no space)</p>
    <p>This paragraph is always visible.</p>

</body>
</html>
