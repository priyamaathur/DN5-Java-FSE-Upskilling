<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Methods</title>

    <!-- Embedded style -->
    <style>
        /* Body background - embedded style */
        body {
            background-color: #f0f4f8;
        }
    </style>

    <!-- External stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Inline style - heading red -->
    <h1 style="color: red;">Local Community Event Portal</h1>

    <h2>About Our Community </h2>
    <p class="cta">Join us for upcoming events!</p>

</body>
</html>
