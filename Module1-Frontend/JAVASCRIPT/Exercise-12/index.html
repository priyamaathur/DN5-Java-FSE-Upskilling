<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fetch API</title>
</head>
<body>

    <h2>AJAX and Fetch API</h2>

    <button onclick="submitRegistration()">Submit Registration</button>
    <p id="responseMsg"></p>

    <script>
        async function submitRegistration() {
            const userData = {
                name: "Alice",
                email: "alice@example.com",
                event: "Tech Meetup"
            };

            document.getElementById('responseMsg').textContent = "Submitting...";

            try {
                // POST to mock API
                const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (response.ok) {
                    // Simulate delayed response
                    setTimeout(() => {
                        document.getElementById('responseMsg').textContent =
                            "Registration successful!";
                    }, 1000);
                } else {
                    document.getElementById('responseMsg').textContent =
                        "Registration failed!";
                }
            } catch (err) {
                document.getElementById('responseMsg').textContent =
                    "Error: " + err.message;
            }
        }
    </script>

</body>
</html>
