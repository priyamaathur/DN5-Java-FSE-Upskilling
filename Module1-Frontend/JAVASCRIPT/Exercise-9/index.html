<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Async JS</title>
</head>
<body>

    <h2>Async JS</h2>
    <p id="spinner" style="display:none">Loading...</p>
    <div id="output"></div>
    <button onclick="loadEvents()">Load Events</button>

    <script>
        // Mock API URL
        const API = "https://jsonplaceholder.typicode.com/posts?_limit=3";

        // Using .then() and .catch()
        function loadWithPromise() {
            fetch(API)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('output').innerHTML =
                        data.map(d => `<p>${d.title}</p>`).join('');
                })
                .catch(err => console.log("Error: " + err));
        }

        // Using async/await with loading spinner
        async function loadEvents() {
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('output').innerHTML = '';

            try {
                const res = await fetch(API);
                const data = await res.json();
                document.getElementById('output').innerHTML =
                    data.map(d => `<p>${d.title}</p>`).join('');
            } catch (err) {
                document.getElementById('output').textContent = "Error loading events.";
            } finally {
                document.getElementById('spinner').style.display = 'none';
            }
        }
    </script>

</body>
</html>
